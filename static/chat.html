<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enpro Chat</title>
    <style>
        :root {
            --navy: #003366;
            --accent: #0066CC;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --stock-green: #28a745;
            --stock-red: #D83B01;
            --stock-orange: #e67e22;
            --purple: #6B2D8B;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Mini header (widget context) ── */
        .mini-header {
            background: var(--navy);
            color: white;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
        }
        .mini-dot {
            width: 8px; height: 8px;
            background: var(--stock-green);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Quick Actions (compact) ── */
        .quick-actions {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            background: white;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .qa-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--navy);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .qa-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
        .qa-icon { font-size: 14px; }

        /* ── Chat Area ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 90%; animation: msgIn 0.2s ease-out; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user { align-self: flex-end; }
        .msg.bot { align-self: flex-start; }
        .msg-bubble {
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.user .msg-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 2px;
        }
        .msg.bot .msg-bubble {
            background: var(--card-bg);
            color: var(--text);
            border-bottom-left-radius: 2px;
            box-shadow: var(--shadow);
        }
        .msg-time {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 2px;
            padding: 0 4px;
        }
        .msg.user .msg-time { text-align: right; }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 14px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .typing-indicator.active { display: flex; gap: 4px; align-items: center; }
        .typing-dot {
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Product Card ── */
        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin: 4px 0;
        }
        .product-card-header {
            background: var(--navy);
            color: white;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 13px;
        }
        .product-card-body { padding: 10px 12px; }
        .product-field {
            display: flex;
            flex-direction: column;
            gap: 1px;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
        }
        .product-field:last-child { border-bottom: none; }
        .product-field-label {
            font-weight: 600;
            color: var(--text-light);
            font-size: 11px;
        }
        .product-field-value { color: var(--text); }

        .stock-section { margin-top: 6px; padding-top: 6px; border-top: 2px solid var(--bg); }
        .stock-title { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 2px;
        }
        .stock-row.in-stock { background: rgba(40,167,69,0.08); }
        .stock-row.low-stock { background: rgba(230,126,34,0.08); }
        .stock-qty {
            font-weight: 700; padding: 1px 6px; border-radius: 10px;
            font-size: 11px; color: white;
        }
        .stock-qty.green { background: var(--stock-green); }
        .stock-qty.orange { background: var(--stock-orange); }
        .stock-qty.red { background: var(--stock-red); }

        .product-price {
            margin-top: 6px; padding: 6px 10px;
            background: var(--bg); border-radius: 6px;
            font-size: 13px; font-weight: 600;
        }
        .product-price.has-price { color: var(--stock-green); }
        .product-price.no-price { color: var(--text-light); font-weight: 400; font-style: italic; }

        .product-footer {
            padding: 6px 12px; background: var(--bg);
            font-size: 10px; color: var(--text-light);
            text-align: center; border-top: 1px solid var(--border);
        }

        /* ── Follow-ups ── */
        .followup-buttons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .followup-btn {
            padding: 4px 10px;
            background: white;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 14px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .followup-btn:hover { background: var(--accent); color: white; }

        /* ── Chemical Card ── */
        .chemical-card {
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden; margin: 4px 0;
        }
        .chemical-card-header {
            background: var(--purple); color: white;
            padding: 8px 12px; font-weight: 600; font-size: 13px;
        }
        .chemical-card-body { padding: 10px 12px; }
        .compat-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; border-radius: 6px; margin-bottom: 3px; font-size: 12px;
        }
        .compat-row.compatible { background: rgba(40,167,69,0.08); }
        .compat-row.not-compatible { background: rgba(216,59,1,0.08); }
        .compat-row.limited { background: rgba(230,126,34,0.08); }
        .compat-badge {
            font-weight: 600; font-size: 10px; padding: 2px 8px;
            border-radius: 10px; color: white; text-transform: uppercase;
        }
        .compat-badge.green { background: var(--stock-green); }
        .compat-badge.red { background: var(--stock-red); }
        .compat-badge.orange { background: var(--stock-orange); }

        /* ── Table Card ── */
        .table-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin: 4px 0; }
        .table-card-header { background: var(--navy); color: white; padding: 8px 12px; font-weight: 600; font-size: 13px; }
        .table-card table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table-card th { background: var(--bg); padding: 6px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); }
        .table-card td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
        .table-card tr:nth-child(even) td { background: #fafafa; }
        .table-card-wrapper { overflow-x: auto; }

        /* ── Numbered Options ── */
        .numbered-options { margin-top: 6px; }
        .numbered-option {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 4px 0; font-size: 12px; cursor: pointer;
        }
        .numbered-option:hover { color: var(--accent); }
        .option-num {
            background: var(--accent); color: white;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; flex-shrink: 0;
        }

        /* ── Markdown ── */
        .msg.bot .msg-bubble strong { font-weight: 700; }
        .msg.bot .msg-bubble em { font-style: italic; }
        .msg.bot .msg-bubble ul, .msg.bot .msg-bubble ol { margin: 4px 0 4px 18px; }
        .msg.bot .msg-bubble code { background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 12px; }

        /* ── Input ── */
        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1; resize: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.4;
            max-height: 80px;
            outline: none;
        }
        .input-area textarea:focus { border-color: var(--accent); }
        .input-area textarea::placeholder { color: #aaa; }
        .send-btn {
            width: 36px; height: 36px;
            background: var(--accent); color: white;
            border: none; border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .send-btn:hover { background: var(--navy); }
        .send-btn:disabled { background: #ccc; cursor: default; }
        .send-btn svg { width: 18px; height: 18px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 10px;
            width: 100%; max-width: 360px; overflow: hidden;
            animation: modalIn 0.2s ease-out;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header {
            background: var(--navy); color: white;
            padding: 10px 14px; font-weight: 600; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .modal-body { padding: 14px; }
        .modal-body label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .modal-body input {
            width: 100%; padding: 8px 12px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 13px; font-family: inherit; outline: none;
        }
        .modal-body input:focus { border-color: var(--accent); }
        .modal-body .hint { font-size: 11px; color: var(--text-light); margin-top: 4px; }
        .modal-footer {
            padding: 10px 14px; display: flex; gap: 6px;
            justify-content: flex-end; border-top: 1px solid var(--border);
        }
        .modal-btn {
            padding: 6px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 500; cursor: pointer; border: none;
        }
        .modal-btn.primary { background: var(--accent); color: white; }
        .modal-btn.primary:hover { background: var(--navy); }
        .modal-btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

        /* ── Welcome ── */
        .welcome { text-align: center; padding: 24px 16px; color: var(--text-light); }
        .welcome h2 { font-size: 16px; color: var(--text); margin-bottom: 4px; }
        .welcome p { font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>

<!-- Mini header -->
<div class="mini-header">
    <div class="mini-dot"></div>
    Filtration Mastermind
</div>

<!-- Quick Actions -->
<div class="quick-actions">
    <button class="qa-btn" onclick="showModal('lookup')">
        <span class="qa-icon">&#128269;</span> Lookup
    </button>
    <button class="qa-btn" onclick="showModal('chemical')">
        <span class="qa-icon">&#9879;</span> Chemical
    </button>
    <button class="qa-btn" onclick="showModal('search')">
        <span class="qa-icon">&#128196;</span> Search
    </button>
    <button class="qa-btn" onclick="sendMessage('Pregame briefing')">
        <span class="qa-icon">&#127919;</span> Pregame
    </button>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
    <div class="welcome">
        <h2>Filtration Mastermind</h2>
        <p>Ask about parts, chemicals, or specs.</p>
    </div>
</div>

<!-- Typing Indicator -->
<div class="typing-indicator" id="typingIndicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
</div>

<!-- Input -->
<div class="input-area">
    <textarea id="userInput" rows="1" placeholder="Ask anything..."
        onkeydown="handleKeyDown(event)" oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
    </button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="hideModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modalTitle">Lookup</span>
            <button class="modal-close" onclick="hideModal()">&times;</button>
        </div>
        <div class="modal-body">
            <label id="modalLabel">Part Number</label>
            <input type="text" id="modalInput" placeholder="" onkeydown="if(event.key==='Enter')modalSubmit()">
            <div class="hint" id="modalHint"></div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn secondary" onclick="hideModal()">Cancel</button>
            <button class="modal-btn primary" onclick="modalSubmit()">Go</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
