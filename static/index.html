<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0078d4">
    <title>Enpro Filtration Mastermind</title>
    <script>
    // Auth gate: redirect to /login.html if not authenticated.
    // Soft-fail (continue rendering) if /api/auth/me returns 503.
    (function() {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/auth/me', false);
        xhr.withCredentials = true;
        xhr.send();
        if (xhr.status === 401) {
          window.location.replace('/login.html');
        } else if (xhr.status === 200) {
          try { window.__FM_USER = JSON.parse(xhr.responseText); } catch (_) {}
        }
      } catch (e) {
        // Allow page render; API calls will surface runtime errors.
      }
    })();
    </script>
    <link rel="stylesheet" href="styles_v3.css">
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="logo">Enpro Mastermind</div>
            <div id="contextBar">
                <span class="context-placeholder">New conversation</span>
            </div>
        </header>

        <main id="chatHistory"></main>

        <div id="typingIndicator" style="display: none;">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>Thinking...</span>
        </div>

        <footer id="inputArea">
            <button id="micBtn" class="mic-large" aria-label="Hold to speak">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span>Hold to speak</span>
            </button>

            <div class="text-input-row">
                <input
                    type="text"
                    id="textInput"
                    placeholder="Ask me anything... part numbers, applications, meetings"
                    autocomplete="off"
                    aria-label="Type your message"
                >
                <button id="sendBtn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="app_v3.js"></script>
</body>
</html>
